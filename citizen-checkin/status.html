<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>เช็คสถานะคำขอความช่วยเหลือ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700;900&display=swap');

:root{
  --bg:#0B1220;
  --bg-card:#121A2B;
  --bg-input:#1A2438;
  --red:#DC2626;
  --red-dark:#991B1B;
  --yellow:#FACC15;
  --green:#16A34A;
  --white:#F8FAFC;
  --gray:#94A3B8;
  --border:#26324A;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:var(--bg);
  color:var(--white);
  font-family:'Noto Sans Thai',sans-serif;
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
}
.container{
  max-width:480px;
  margin:0 auto;
  padding:24px 18px 40px;
}
.header{
  text-align:center;
  margin-bottom:20px;
}
.header .icon{
  font-size:2.4rem;
  margin-bottom:8px;
}
.header h1{
  font-size:1.25rem;
  font-weight:900;
}
.header .req-id{
  color:var(--gray);
  font-size:0.85rem;
  margin-top:4px;
}

.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
  margin-bottom:16px;
}

.need-row{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:1.05rem;
  font-weight:700;
  margin-bottom:6px;
}
.meta-row{
  color:var(--gray);
  font-size:0.85rem;
  margin-top:4px;
}

/* Timeline */
.timeline{
  margin-top:8px;
}
.timeline-step{
  display:flex;
  gap:12px;
  position:relative;
  padding-bottom:22px;
}
.timeline-step:last-child{
  padding-bottom:0;
}
.timeline-dot-col{
  display:flex;
  flex-direction:column;
  align-items:center;
}
.timeline-dot{
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0.85rem;
  flex-shrink:0;
  background:var(--bg-input);
  border:2px solid var(--border);
  color:var(--gray);
}
.timeline-dot.done{
  background:var(--green);
  border-color:var(--green);
  color:white;
}
.timeline-dot.active{
  background:var(--yellow);
  border-color:var(--yellow);
  color:#1a1a2e;
  animation:pulse-dot 1.5s infinite;
}
@keyframes pulse-dot{
  0%,100%{ box-shadow:0 0 0 0 rgba(250,204,21,0.5); }
  50%{ box-shadow:0 0 0 8px rgba(250,204,21,0); }
}
.timeline-line{
  width:2px;
  flex:1;
  background:var(--border);
  margin-top:2px;
}
.timeline-line.done{
  background:var(--green);
}
.timeline-content{
  flex:1;
  padding-top:3px;
}
.timeline-label{
  font-weight:700;
  font-size:0.92rem;
}
.timeline-label.pending{
  color:var(--gray);
  font-weight:500;
}
.timeline-sub{
  font-size:0.75rem;
  color:var(--gray);
  margin-top:2px;
}

.responder-card{
  background:rgba(22,163,74,0.1);
  border:1px solid rgba(22,163,74,0.4);
  border-radius:12px;
  padding:14px;
  margin-top:6px;
}
.responder-card .label{
  font-size:0.75rem;
  color:var(--green);
  font-weight:700;
  margin-bottom:4px;
}
.responder-card .name{
  font-size:1rem;
  font-weight:700;
}
.responder-card a{
  color:var(--green);
  text-decoration:none;
  font-weight:700;
}

.helped-banner{
  text-align:center;
  padding:20px;
}
.helped-banner .icon{
  font-size:3rem;
  margin-bottom:8px;
}
.helped-banner h2{
  color:var(--green);
  font-size:1.2rem;
  margin-bottom:6px;
}
.helped-banner p{
  color:var(--gray);
  font-size:0.88rem;
}

.error-screen{
  text-align:center;
  padding:60px 20px;
}
.error-screen .icon{
  font-size:3rem;
  margin-bottom:12px;
}
.error-screen p{
  color:var(--gray);
  font-size:0.9rem;
  line-height:1.6;
}

.refresh-note{
  text-align:center;
  font-size:0.7rem;
  color:var(--gray);
  margin-top:14px;
}
.spinner{
  display:inline-block;
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--green);
  animation:blink 1.4s infinite;
  margin-right:6px;
}
@keyframes blink{
  0%,100%{ opacity:0.3; }
  50%{ opacity:1; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="icon">📍</div>
    <h1>สถานะคำขอความช่วยเหลือ</h1>
    <div class="req-id" id="reqIdLabel">-</div>
  </div>

  <div id="loadingScreen" style="text-align:center;padding:60px 20px;color:var(--gray);">
    กำลังโหลดข้อมูล...
  </div>

  <div id="errorScreen" class="error-screen" style="display:none;">
    <div class="icon">⚠️</div>
    <p id="errorMsg">ไม่พบคำขอนี้ หรือรหัสยืนยันไม่ถูกต้อง</p>
  </div>

  <div id="contentScreen" style="display:none;">

    <div class="card">
      <div class="need-row"><span id="needEmoji"></span><span id="needLabel"></span></div>
      <div class="meta-row" id="locText"></div>
      <div class="meta-row" id="peopleText"></div>
    </div>

    <div class="card" id="timelineCard">
      <div class="timeline" id="timeline"></div>
    </div>

    <div id="responderSection" style="display:none;">
      <div class="responder-card">
        <div class="label">🚑 ทีมที่กำลังช่วยเหลือคุณ</div>
        <div class="name" id="responderNameText">-</div>
        <div id="responderPhoneRow"></div>
      </div>
    </div>

    <div id="helpedSection" style="display:none;" class="card">
      <div class="helped-banner">
        <div class="icon">🎉</div>
        <h2>ได้รับการช่วยเหลือแล้ว</h2>
        <p>ขอบคุณที่รอ — หากยังต้องการความช่วยเหลือเพิ่มเติม กรุณาติดต่อทีมงานในพื้นที่</p>
      </div>
    </div>

    <div class="refresh-note"><span class="spinner"></span>อัปเดตอัตโนมัติทุก 5 วินาที</div>

  </div>

</div>

<script>
const SUPABASE_URL = 'https://cpdhykeogdgjjxmwvnkt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ziI_yJath2uIPrurZkhHtw_HlTOv1bq';

const PARAMS = new URLSearchParams(window.location.search);
const REQ_ID = PARAMS.get('id') || '';
const VERIFY_CODE = PARAMS.get('code') || '';

const NEED_META = {
  boat: { emoji: '🚤', label: 'ต้องการเรือ' },
  medical: { emoji: '💊', label: 'ช่วยทางการแพทย์' },
  supplies: { emoji: '🍚', label: 'อาหาร / น้ำ' },
  trapped: { emoji: '🆘', label: 'ติดอยู่ ออกไม่ได้' }
};

const STEPS = [
  { key: 'new', label: 'ส่งคำขอแล้ว', sub: 'รอทีมรับเรื่อง' },
  { key: 'claimed', label: 'มีทีมรับเรื่องแล้ว', sub: 'กำลังเตรียมตัวออกเดินทาง' },
  { key: 'enroute', label: 'ทีมกำลังเดินทางมา', sub: 'ใกล้ถึงแล้ว รอสักครู่' },
  { key: 'arrived', label: 'ทีมถึงจุดแล้ว', sub: 'แจ้งรหัสยืนยันตัวให้ทีมที่มาถึง' },
  { key: 'helped', label: 'ช่วยเหลือเสร็จสิ้น', sub: 'เสร็จสมบูรณ์' }
];
const STEP_ORDER = STEPS.map(s => s.key);

let pollInterval = null;

function showError(msg) {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('contentScreen').style.display = 'none';
  document.getElementById('errorScreen').style.display = 'block';
  if (msg) document.getElementById('errorMsg').textContent = msg;
}

function escapeHtml(s) {
  return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderTimeline(status) {
  const currentIdx = STEP_ORDER.indexOf(status);
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = STEPS.map((step, idx) => {
    const isActive = idx === currentIdx && status !== 'helped';
    const isDoneFinal = idx <= currentIdx;
    const dotClass = isDoneFinal ? (isActive ? 'active' : 'done') : '';
    const dotContent = isDoneFinal && !isActive ? '✓' : (idx + 1);
    const lineClass = idx < currentIdx ? 'done' : '';
    const labelClass = isDoneFinal ? '' : 'pending';
    const isLast = idx === STEPS.length - 1;
    return `
      <div class="timeline-step">
        <div class="timeline-dot-col">
          <div class="timeline-dot ${dotClass}">${dotContent}</div>
          ${!isLast ? `<div class="timeline-line ${lineClass}"></div>` : ''}
        </div>
        <div class="timeline-content">
          <div class="timeline-label ${labelClass}">${step.label}</div>
          <div class="timeline-sub">${step.sub}</div>
        </div>
      </div>`;
  }).join('');
}

function renderRequest(req) {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('errorScreen').style.display = 'none';
  document.getElementById('contentScreen').style.display = 'block';

  document.getElementById('reqIdLabel').textContent = '#' + req.id;

  const need = NEED_META[req.need] || { emoji: '🆘', label: req.need || '-' };
  document.getElementById('needEmoji').textContent = need.emoji;
  document.getElementById('needLabel').textContent = need.label;
  document.getElementById('locText').textContent = '📍 ' + (req.loc || '(ไม่ระบุจุดสังเกต)');
  document.getElementById('peopleText').textContent = '👥 ' + (req.people || 1) + ' คน';

  renderTimeline(req.status);

  const responderSection = document.getElementById('responderSection');
  if (req.status === 'claimed' || req.status === 'enroute' || req.status === 'arrived') {
    responderSection.style.display = 'block';
    document.getElementById('responderNameText').textContent = req.responder_name || 'ทีมกู้ภัย';
    const phoneRow = document.getElementById('responderPhoneRow');
    phoneRow.innerHTML = req.responder_phone
      ? `📞 <a href="tel:${req.responder_phone}">${escapeHtml(req.responder_phone)}</a>`
      : '';
  } else {
    responderSection.style.display = 'none';
  }

  document.getElementById('helpedSection').style.display = req.status === 'helped' ? 'block' : 'none';
  document.getElementById('timelineCard').style.display = req.status === 'helped' ? 'none' : 'block';
}

async function fetchAndRender() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/help_requests?select=*&id=eq.${encodeURIComponent(REQ_ID)}&verify_code=eq.${encodeURIComponent(VERIFY_CODE)}`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) { showError(); return; }
    const data = await res.json();
    if (!data || data.length === 0) {
      showError('ไม่พบคำขอนี้ — ลิงก์อาจไม่ถูกต้อง หรือรหัสยืนยันไม่ตรงกับคำขอ');
      return;
    }
    renderRequest(data[0]);
  } catch (e) {
    showError('เชื่อมต่อไม่ได้ — ตรวจสอบสัญญาณอินเทอร์เน็ตแล้วลองรีเฟรชหน้านี้');
  }
}

function init() {
  if (!REQ_ID || !VERIFY_CODE) {
    showError('ลิงก์นี้ไม่ถูกต้อง — กรุณาใช้ลิงก์ที่ได้รับหลังส่งคำขอความช่วยเหลือ');
    return;
  }
  fetchAndRender();
  pollInterval = setInterval(fetchAndRender, 5000);
}

init();
</script>

</body>
</html>
